<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MuinShop</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#fff;
}

.section {
  padding:20px;
  text-align:center;
}

.banner {
  background:#000;
  color:white;
  padding:40px 20px;
}

.banner h1 {
  font-size:28px;
}

img {
  width:100%;
  max-width:400px;
  border-radius:10px;
}

.btn {
  display:inline-block;
  background:#25D366;
  color:white;
  padding:15px 25px;
  text-decoration:none;
  border-radius:10px;
  font-size:18px;
  margin-top:15px;
}

.highlight {
  background:#fff3cd;
  padding:10px;
  border-radius:10px;
  margin-top:10px;
}

.price {
  font-size:28px;
  color:red;
}

.old {
  text-decoration: line-through;
  color:gray;
  font-size:16px;
}
</style>

</head>

<body>

<!-- BANNER -->
<div class="banner">
  <h1>🔥 PRODUK VIRAL TIKTOK 🔥</h1>
  <p>Ramai dah beli, jangan ketinggalan!</p>
</div>

<!-- GAMBAR -->
<div class="section">
  <img src="https://via.placeholder.com/400x400">
</div>

<!-- KELEBIHAN -->
<div class="section">
  <h2>Kelebihan Produk</h2>
  <div class="highlight">✔ Mudah guna</div>
  <div class="highlight">✔ Murah</div>
  <div class="highlight">✔ Kualiti padu</div>
</div>

<!-- TESTIMONI -->
<div class="section">
  <h2>Testimoni</h2>
  <p>⭐⭐⭐⭐⭐ “Memang terbaik!”</p>
  <p>⭐⭐⭐⭐⭐ “Worth it beli!”</p>
</div>

<!-- HARGA -->
<div class="section">
  <h2>Harga Promosi</h2>
  <p class="price">RM25 <span class="old">RM50</span></p>
</div>

<!-- BUTTON -->
<div class="section">
  <a class="btn" href="https://wa.me/601XXXXXXXXX">
    BELI SEKARANG
  </a>
</div>

<!-- URGENCY -->
<div class="section">
  <p>⚠️ Stok terhad! Cepat sebelum habis!</p>
</div>

</body>
</html>
